# Layer 2: eg-pair release for pair 1 (prefix=tr, index=1).
# Apply after CRDs are installed and Flux controllers are running.
#
# Teardown order:
#   1. kubectl delete gateway --all -n tr-dataplane-1 --wait=true
#   2. kubectl delete -f helmrelease-pair-1.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: eg-pair-1
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: tr-system-1
  install:
    createNamespace: true
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    crds: Skip
    remediation:
      retries: 3
  chart:
    spec:
      chart: eg-pair
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: gateway-pairs
        namespace: flux-system
      interval: 10m
  values:
    pair:
      index: 1
      namePrefix: tr
    controller:
      topologyInjector: false
    gateway-helm:
      config:
        envoyGateway:
          gateway:
            controllerName: gateway.envoyproxy.io/tr-1
          provider:
            kubernetes:
              deploy:
                type: GatewayNamespace
              watch:
                type: Namespaces
                namespaces:
                  - tr-system-1
                  - tr-dataplane-1
      topologyInjector:
        enabled: false
