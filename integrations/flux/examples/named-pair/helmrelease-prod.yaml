# Named pair: prefix=tr, suffix=prod
# Namespaces: tr-system-prod, tr-dataplane-prod
# GatewayClass: tr-prod
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: eg-pair-prod
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: tr-system-prod
  install:
    createNamespace: true
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    crds: Skip
    remediation:
      retries: 3
  chart:
    spec:
      chart: eg-pair
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: gateway-pairs
        namespace: flux-system
      interval: 10m
  values:
    pair:
      index: 0          # 0 = use nameSuffix, not numeric index
      namePrefix: tr
      nameSuffix: prod
    controller:
      topologyInjector: false
    gateway-helm:
      config:
        envoyGateway:
          gateway:
            controllerName: gateway.envoyproxy.io/tr-prod
          provider:
            kubernetes:
              deploy:
                type: GatewayNamespace
              watch:
                type: Namespaces
                namespaces:
                  - tr-system-prod
                  - tr-dataplane-prod
      topologyInjector:
        enabled: false
