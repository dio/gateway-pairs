name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: true

    - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

    - name: Verify go mod tidy
      run: make tidy-check

    - name: Generate assets (CRDs + subchart deps)
      run: make generate-assets

    - name: Build
      run: make build

    - name: Vet
      run: make vet

    - name: Unit tests
      run: make test

    - name: Helm lint
      run: make helm-lint

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-e2e')
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: simple
            run: make e2e-simple
          - name: simple-gwp
            run: make e2e-simple-gwp
          - name: multipairs
            run: make e2e
          - name: flux
            run: make e2e-flux
    name: e2e (${{ matrix.suite.name }})
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: true

    - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

    - name: Install k3d
      run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.7.4 bash

    - name: Run ${{ matrix.suite.name }}
      run: ${{ matrix.suite.run }}
