name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create releases, upload assets
  packages: write   # push to ghcr.io

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      # EG_VERSION controls which gateway-crds-helm version is pulled
      # during 'make generate-assets' in the goreleaser before.hooks,
      # and is baked into the gwp binary via ldflags.
      # Update this when upgrading Envoy Gateway.
      EG_VERSION: v1.8.0
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0  # goreleaser needs full history for changelog

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - uses: azure/setup-helm@v5

    - uses: goreleaser/goreleaser-action@v7
      with:
        version: "~> v2"
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        EG_VERSION: ${{ env.EG_VERSION }}

  publish-charts:
    runs-on: ubuntu-latest
    needs: goreleaser
    env:
      EG_VERSION: v1.8.0
      CHART_VERSION: ${{ github.ref_name }}
    steps:
    - uses: actions/checkout@v6

    - uses: azure/setup-helm@v5

    - name: Fetch subchart dependencies
      # eg-pair depends on gateway-helm as a subchart.
      # helm package requires the tarballs to be present in charts/.
      run: helm dependency update ./charts/eg-pair

    - name: Login to ghcr.io
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" \
          | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

    - name: Package and push eg-pair chart
      run: |
        # Strip leading 'v' from tag: v0.1.0 -> 0.1.0
        VERSION="${CHART_VERSION#v}"

        helm package charts/eg-pair \
          --version "${VERSION}" \
          --app-version "${EG_VERSION}"

        helm push "eg-pair-${VERSION}.tgz" \
          "oci://ghcr.io/${{ github.repository_owner }}/gateway-pairs/charts"

    - name: Print chart ref
      run: |
        VERSION="${CHART_VERSION#v}"
        echo "Published:"
        echo "  oci://ghcr.io/${{ github.repository_owner }}/gateway-pairs/charts/eg-pair:${VERSION}"
