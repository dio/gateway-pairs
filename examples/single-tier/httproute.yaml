# HTTPRoute for pair 1, single-tier.
# Routes all traffic to a backend service named "backend" in the same namespace.
# Replace backend/port with your actual service.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: default
  namespace: tr-dataplane-1
spec:
  parentRefs:
  - name: proxy              # matches gateway.yaml metadata.name (same namespace)
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: backend          # your Service name
      port: 8080
