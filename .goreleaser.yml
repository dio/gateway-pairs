version: 2

project_name: gateway-pairs

before:
  hooks:
    # go mod tidy at the root (cmd/gwp module).
    - go mod tidy
    # Pre-render CRD YAML from gateway-crds-helm and copy charts into
    # internal/assets/ so the embed directives resolve at build time.
    # EG_VERSION is injected by the release workflow via the env block below.
    - make generate-assets EG_VERSION={{ .Env.EG_VERSION }}

builds:
  - id: gwp
    main: ./cmd/gwp
    binary: gwp
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - arm64
      - amd64
    ignore:
      - goos: windows
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.egVersion={{.Env.EG_VERSION}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - docs/

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: dio
    name: gateway-pairs
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  # Embed the bundled EG and Gateway API versions in the release notes.
  extra_files:
    - glob: charts/crds/envoy-gateway.yaml
    - glob: charts/crds/gateway-api-standard.yaml

brews:
  - name: gwp
    directory: Formula
    repository:
      owner: dio
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: Dhi Aurrahman
      email: dio@rockybars.com
    homepage: "https://github.com/dio/gateway-pairs"
    description: "Deploy Envoy Gateway as isolated controller+dataplane pairs in a Kubernetes cluster"
    license: "Apache-2.0"
    install: |
      bin.install "gwp"
    test: |
      system "#{bin}/gwp", "version"
