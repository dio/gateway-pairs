crds:
  # Install Gateway API CRDs.
  # Set false when the cluster provider already manages them (GKE, AKS autopilot, etc.)
  gatewayAPI:
    enabled: true
    # standard: core stable resources only
    # experimental: adds TCPRoute, BackendTLSPolicy, etc.
    channel: standard

  # Install Envoy Gateway-specific CRDs (EnvoyProxy, EnvoyPatchPolicy, etc.)
  # Almost always true.
  envoyGateway:
    enabled: true
