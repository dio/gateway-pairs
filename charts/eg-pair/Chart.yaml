apiVersion: v2
name: eg-pair
description: >
  One Envoy Gateway controller+dataplane pair. Deploy one release per pair.
  Requires CRDs installed via gwp crds install first.
  Depends on gateway-helm for the EG controller; eg-pair adds the
  two-namespace model, GatewayClass, and infra-manager RBAC extension.
type: application
version: 0.0.0-dev
appVersion: "0.0.0-dev"

dependencies:
- name: gateway-helm
  version: "v1.8.0"
  repository: "oci://docker.io/envoyproxy"
