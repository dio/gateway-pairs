{{- $sysNS := include "eg-pair.systemNamespace" . }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-gateway
  namespace: {{ $sysNS }}
  labels:
    app.kubernetes.io/name: envoy-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    eg-pair: {{ .Values.pair.index | quote }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: envoy-gateway
      eg-pair: {{ .Values.pair.index | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: envoy-gateway
        eg-pair: {{ .Values.pair.index | quote }}
    spec:
      serviceAccountName: envoy-gateway
      containers:
      - name: envoy-gateway
        image: {{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}
        imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
        args:
        - server
        - --config-path=/config/envoy-gateway.yaml
        env:
        - name: ENVOY_GATEWAY_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: cluster.local
        ports:
        - name: grpc
          containerPort: 18000
          protocol: TCP
        - name: ratelimit
          containerPort: 18001
          protocol: TCP
        - name: metrics
          containerPort: 19001
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.controller.resources | nindent 10 }}
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: envoy-gateway-config
      securityContext:
        runAsNonRoot: true
