{{- $sysNS := include "eg-pair.systemNamespace" . }}
{{- $gcName := include "eg-pair.gatewayClassName" . }}

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ $sysNS }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    eg-pair: {{ .Values.pair.index | quote }}
spec:
  gatewayClassName: {{ $gcName }}
  listeners:
  {{- range .Values.gateway.listeners }}
  - name: {{ .name }}
    port: {{ .port }}
    protocol: {{ .protocol }}
    allowedRoutes:
      namespaces:
        # Same: HTTPRoutes must be in the same namespace as the Gateway
        # (tr-system-{i}). This is where tenants deploy their routes.
        # In GatewayNamespace mode EG places the proxy in the Gateway's
        # namespace, so tr-system-{i} holds controller + proxy + routes.
        from: Same
  {{- end }}
