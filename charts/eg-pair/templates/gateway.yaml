{{- if .Values.gateway.create }}
{{- $dpNS  := include "eg-pair.dataplaneNamespace" . }}
{{- $gcName := include "eg-pair.gatewayClassName" . }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ $dpNS }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    eg-pair: {{ .Values.pair.index | quote }}
spec:
  gatewayClassName: {{ $gcName }}
  listeners:
  {{- range .Values.gateway.listeners }}
  - name: {{ .name }}
    port: {{ .port }}
    protocol: {{ .protocol }}
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            tr/gateway-routes: "true"
  {{- end }}
{{- end }}
