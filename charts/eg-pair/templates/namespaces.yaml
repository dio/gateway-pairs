{{- $dpNS := include "eg-pair.dataplaneNamespace" . }}

{{/*
Only the dataplane namespace is declared here as a chart resource.
The system namespace (tr-system-{i}) is created by --create-namespace at
install time and is owned by Helm as the release namespace.
Declaring it here too causes an ownership conflict on install.
*/}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $dpNS }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    eg-pair: {{ .Values.pair.index | quote }}
    eg-role: dataplane
    tr/gateway-routes: "true"
