{{- $sysNS := include "eg-pair.systemNamespace" . }}
{{- $prefix := include "eg-pair.prefix" . }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $prefix }}-certgen
  namespace: {{ $sysNS }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    eg-pair: {{ .Values.pair.index | quote }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $prefix }}-certgen
  namespace: {{ $sysNS }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $prefix }}-certgen
  namespace: {{ $sysNS }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $prefix }}-certgen
subjects:
- kind: ServiceAccount
  name: {{ $prefix }}-certgen
  namespace: {{ $sysNS }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $prefix }}-certgen
  namespace: {{ $sysNS }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    eg-pair: {{ .Values.pair.index | quote }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  completions: 1
  parallelism: 1
  ttlSecondsAfterFinished: 30
  template:
    metadata:
      labels:
        app: certgen
        eg-pair: {{ .Values.pair.index | quote }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ $prefix }}-certgen
      containers:
      - name: certgen
        image: {{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}
        imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
        command:
        - envoy-gateway
        - certgen
        {{- if not .Values.controller.topologyInjector }}
        - --disable-topology-injector
        {{- end }}
        env:
        - name: ENVOY_GATEWAY_NAMESPACE
          value: {{ $sysNS }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: cluster.local
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          seccompProfile:
            type: RuntimeDefault
