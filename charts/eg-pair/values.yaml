# pair.index is the canonical identity for this pair.
# All namespace and resource names are derived from it unless overridden.
pair:
  index: 1
  # Prefix prepended to all namespace and GatewayClass names.
  # A trailing hyphen is added automatically when the prefix is non-empty
  # and does not already end with one.
  #   "tr"   → "tr-"   (auto-hyphen)
  #   "tr-" → "tr-" (already has hyphen)
  #   ""      → ""      (no prefix, no hyphen)
  namePrefix: tr
  # Suffix appended after the role name. Caller controls any separator.
  # When empty and index > 0, defaults to "-{index}".
  # When empty and index == 0, no suffix (single/unnamed pair).
  #   ""     + index=1  → "-1"   (default)
  #   "-prod"            → "-prod"
  #   "1"               → "1"    (no hyphen before suffix)
  nameSuffix: ""

# Derived names (override only if you need non-standard naming):
#   systemNamespace:   tr-system-{{ pair.index }}
#   dataplaneNamespace: tr-dataplane-{{ pair.index }}
#   gatewayClassName:   tr-{{ pair.index }}

# EG controller image. Must match the installed CRD version.
controller:
  image:
    repository: docker.io/envoyproxy/gateway
    tag: v1.8.0
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # topologyInjector enables the EG MutatingWebhookConfiguration that injects
  # pod topology spread constraints onto Envoy proxy pods.
  # Disabled by default in the multi-pair model: with N pairs each registering
  # a cluster-scoped webhook, they would interfere with each other's proxies.
  # Enable only if you have a single pair and need zone-aware proxy spreading.
  topologyInjector: false

# Default Gateway and EnvoyProxy are off by default.
# eg-pair is a pure infrastructure scaffold; operators apply their own
# Gateways and EnvoyProxies into tr-dataplane-{i} as Layer 3 resources.
# Set create: true only for single-tier convenience or e2e testing.
gateway:
  create: false
  name: eg
  listeners:
    - name: http
      port: 80
      protocol: HTTP

envoyProxy:
  create: false
  name: eg

# RBAC. Only the infra-manager extension is managed here.
# tokenreviews and the cluster-scoped gateway-controller RBAC are owned by
# the gateway-helm subchart.
rbac:
  # Namespace-scoped infra-manager Role in system and dataplane namespaces.
  # EG needs this to create proxy resources in both namespaces.
  infraManager: true

# Values passed to the gateway-helm subchart.
# Static defaults -- the same for every pair.
#
# Per-pair values (controllerName, watch.namespaces) cannot be derived by the
# chart itself because Helm subchart values are resolved before template
# rendering. They are computed from pair.namePrefix + pair.index and injected
# by `gwp pair install` (or make pair-install) at install time:
#
#   --set "gateway-helm.config.envoyGateway.gateway.controllerName=gateway.envoyproxy.io/tr-1"
#   --set "gateway-helm.config.envoyGateway.provider.kubernetes.watch.type=Namespaces"
#   --set "gateway-helm.config.envoyGateway.provider.kubernetes.watch.namespaces={tr-system-1,tr-dataplane-1}"
#
# Do not set these manually. Use gwp pair install or make pair-install.
gateway-helm:
  config:
    envoyGateway:
      provider:
        type: Kubernetes
        kubernetes:
          deploy:
            type: GatewayNamespace
  topologyInjector:
    enabled: false
